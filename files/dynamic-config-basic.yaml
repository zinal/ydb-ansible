metadata:
  kind: MainConfig
  cluster: ""
  version: 0
config:
  yaml_config_enabled: true
  log_config:
    default_level: 4
allowed_labels:
  node_id:
    type: string
  host:
    type: string
  tenant:
    type: string
selector_config:
- description: cookie=INIT-00 merge_strategy=MERGE id=1.1
  selector:
    tenant: /Domain0/testdb
  config:
    shared_cache_config:
      memory_limit: 34359738368
    table_service_config: !inherit
      query_limits: !inherit
        result_rows_limit: 10000
    actor_system_config:
      use_auto_config: true
      node_type: COMPUTE
      cpu_count: 6
